# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

name: (SpringDataPlatform) Java CI with Maven

on:
  push:
    branches: [ "main" ]
    paths:
      - 'SpringDataPlatform/backend/DataPlatform/FlinkRestService/**'
      - '.github/workflows/maven_springDataPlatform.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'SpringDataPlatform/backend/DataPlatform/FlinkRestService/**'
      - '.github/workflows/maven_springDataPlatform.yml'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: |
        cd SpringDataPlatform/backend/DataPlatform/FlinkRestService
        mvn clean compile -B

    - name: Run Unit Tests
      run: |
        cd SpringDataPlatform/backend/DataPlatform/FlinkRestService
        mvn test -B

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: SpringDataPlatform/backend/DataPlatform/FlinkRestService/target/surefire-reports/
        retention-days: 7

  package:
    runs-on: ubuntu-latest
    needs: build

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Package JAR
      run: |
        cd SpringDataPlatform/backend/DataPlatform/FlinkRestService
        mvn package -DskipTests -B

    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: flinkrestservice-jar
        path: SpringDataPlatform/backend/DataPlatform/FlinkRestService/target/*.jar
        retention-days: 7
