# ──────────────────────────────────────────────────────────────────────────────
# Docker profile overrides
# Activated automatically when SPRING_PROFILES_ACTIVE=docker is set in compose.
# Service names (mysql, redis) resolve via Docker's internal DNS.
# ──────────────────────────────────────────────────────────────────────────────

# Database — points to the mysql service in docker-compose
spring.datasource.url=jdbc:mysql://mysql:3306/shopping_cart?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

# Redis — points to the redis service in docker-compose
spring.data.redis.host=redis
spring.data.redis.port=6379

# Quieter SQL logging in containers (debug is noisy in production-like envs)
logging.level.org.hibernate.SQL=warn
