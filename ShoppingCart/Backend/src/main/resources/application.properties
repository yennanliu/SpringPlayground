server.port=9999

# -----------------------------------------------------------------
# Database
# -----------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/shopping_cart
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
# MySQL5Dialect removed in Hibernate 6; auto-detected from Spring Boot 3
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
logging.level.org.hibernate.SQL=debug
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# -----------------------------------------------------------------
# Approach 2 — HikariCP connection pool tuning
# Default pool (10) is the first bottleneck under concurrency.
# Keep total connections < MySQL max_connections (default 151).
# -----------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=ShoppingCartHikariPool

# -----------------------------------------------------------------
# Approach 1 — Virtual Threads (JDK 21 + Spring Boot 3.2)
# Each HTTP request gets a lightweight virtual thread instead of
# a bounded platform thread pool; suspends cheaply on JDBC/Stripe I/O.
# REQUIRES Java 21. Uncomment when running on JDK 21+.
# Also set <java.version>21</java.version> in pom.xml.
# -----------------------------------------------------------------
# spring.threads.virtual.enabled=true

# -----------------------------------------------------------------
# Approach 3 — Redis cache
# -----------------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Cache TTLs are configured per cache-name in RedisConfig.java

# -----------------------------------------------------------------
# Stripe
# NOTE: use keys WITHOUT quotes
# -----------------------------------------------------------------
STRIPE_PUBLIC_KEY=pk_test_51OJSFeLMMLE7XGb55zFRgu8PdipN0S8rpdHUtnVpTSNn7SLsWnrG7rdq2ETBNkzMYGdB7P81hhGzy6GtZJDMI9RV00S6SpI6YB
STRIPE_SECRET_KEY=

# should end with "/" — see Stripe redirect docs
BASE_URL=http://localhost:8080/

# -----------------------------------------------------------------
# Approach 4 — Distributed Lock (Redisson)
# Redisson reuses the Redis connection above; no extra host config needed.
# Lock keys: cart:user:<id>, order:user:<id>
# -----------------------------------------------------------------

# -----------------------------------------------------------------
# Approach 5 — Read Replica routing (AbstractRoutingDataSource)
# Set replica.enabled=true and fill in replica JDBC URL to activate.
# Read-only transactions (@Transactional(readOnly=true)) route to replica.
# -----------------------------------------------------------------
app.datasource.replica.enabled=false
# When enabled, set:
# app.datasource.primary.url=jdbc:mysql://primary-host:3306/shopping_cart
# app.datasource.primary.username=root
# app.datasource.primary.password=
# app.datasource.primary.driver-class-name=com.mysql.cj.jdbc.Driver
# NOTE: DataSourceConfig creates its own HikariDataSource beans that do NOT
# inherit spring.datasource.hikari.* settings. Repeat pool tuning here:
# app.datasource.primary.maximum-pool-size=50
# app.datasource.primary.minimum-idle=10
# app.datasource.primary.connection-timeout=3000
# app.datasource.replica.url=jdbc:mysql://replica-host:3306/shopping_cart
# app.datasource.replica.username=root
# app.datasource.replica.password=
# app.datasource.replica.driver-class-name=com.mysql.cj.jdbc.Driver
# app.datasource.replica.maximum-pool-size=50
# app.datasource.replica.minimum-idle=10
# app.datasource.replica.connection-timeout=3000

# -----------------------------------------------------------------
# Approach 7 — Horizontal Scaling
# Actuator /health is used by load balancers (Nginx, ALB) as a readiness probe.
# -----------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Swagger UI available at: http://localhost:9999/swagger-ui/index.html
