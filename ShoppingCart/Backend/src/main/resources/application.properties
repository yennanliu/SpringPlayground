server.port=9999

# -----------------------------------------------------------------
# Database
# -----------------------------------------------------------------
spring.datasource.url=jdbc:mysql://localhost:3306/shopping_cart
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=true
# MySQL5Dialect removed in Hibernate 6; auto-detected from Spring Boot 3
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
logging.level.org.hibernate.SQL=debug
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# -----------------------------------------------------------------
# Approach 2 — HikariCP connection pool tuning
# Default pool (10) is the first bottleneck under concurrency.
# Keep total connections < MySQL max_connections (default 151).
# -----------------------------------------------------------------
spring.datasource.hikari.maximum-pool-size=50
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.pool-name=ShoppingCartHikariPool

# -----------------------------------------------------------------
# Approach 1 — Virtual Threads (JDK 21 + Spring Boot 3.2)
# Each HTTP request gets a lightweight virtual thread instead of
# a bounded platform thread pool; suspends cheaply on JDBC/Stripe I/O.
# REQUIRES Java 21. Uncomment when running on JDK 21+.
# Also set <java.version>21</java.version> in pom.xml.
# -----------------------------------------------------------------
# spring.threads.virtual.enabled=true

# -----------------------------------------------------------------
# Approach 3 — Redis cache
# -----------------------------------------------------------------
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms

# Cache TTLs are configured per cache-name in RedisConfig.java

