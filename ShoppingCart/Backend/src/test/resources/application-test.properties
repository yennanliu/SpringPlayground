# H2 in-memory database (MySQL compatibility mode)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
# Keep OSIV enabled (same as production) so entities stay managed during Jackson serialization
spring.jpa.open-in-view=true

# Redis is mocked via @MockBean RedisConnectionFactory in each test class.
# Exclude the reactive Redis auto-config — it requires ReactiveRedisConnectionFactory
# which is not mocked and is not used anywhere in this non-reactive app.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Stripe dummy key — tests do not call the Stripe API
STRIPE_SECRET_KEY=sk_test_dummy_key_for_tests
BASE_URL=http://localhost:8080/

# Smaller HikariCP pool is fine for H2
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=3000
spring.datasource.hikari.pool-name=ShoppingCartTestPool
