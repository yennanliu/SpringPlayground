services:
  app:
    restart: always
    build: ./Backend
    working_dir: /app
    volumes:
      - ./Backend:/app
    ports:
      - "9999:9999"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/shopping_cart
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=com.mysql.cj.jdbc.Driver
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_JPA_HIBERNATE_DDL_AUTO=create
      - SPRING_JPA_GENERATE_DDL=true
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: mvn clean spring-boot:run -DskipTests

  vue:
    restart: always
    build: ./Frondend/ecommerce-ui
    working_dir: /app
    ports:
      - "8080:8080"  # Map host port 8080 to container port 8080
    volumes:
      - ./Frondend/ecommerce-ui:/app  # Mount the current directory into the container
    command: npm run serve

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  mysql:
    image: mysql:8.0        # 8.0 has native ARM64 images; 5.7 does not
    restart: always
    environment:
      MYSQL_DATABASE: shopping_cart
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mysql-data:
