version: '3.8'

# ──────────────────────────────────────────────────────────────────────────────
# Development stack — single app instance, Redis, MySQL.
# Usage:
#   docker-compose up --build
#   docker-compose up          # skip rebuild if image is current
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── Spring Boot app ──────────────────────────────────────────────────────
  app:
    build: ./Backend                      # multi-stage build → JRE 21 slim image
    restart: on-failure
    ports:
      - "9999:9999"
    environment:
      SPRING_PROFILES_ACTIVE: docker      # activates application-docker.properties
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      STRIPE_PUBLIC_KEY: ${STRIPE_PUBLIC_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      BASE_URL: http://localhost:8080/
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Vue.js frontend ───────────────────────────────────────────────────────
  vue:
    build: ./Frondend/ecommerce-ui
    restart: on-failure
    ports:
      - "8080:8080"
    volumes:
      - ./Frondend/ecommerce-ui:/app
      - /app/node_modules                 # anonymous volume keeps container node_modules intact
    command: npm run serve

  # ── MySQL ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: shopping_cart
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Redis ─────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mysql-data:
  redis-data:
