worker_processes auto;                  # one worker per CPU core

events {
    worker_connections 4096;            # max simultaneous connections per worker
    use epoll;                          # Linux epoll for C10K-class connection handling
    multi_accept on;                    # accept all pending connections at once
}

http {
    # ── Upstream: app replicas ──────────────────────────────────────────────
    upstream shoppingcart {
        least_conn;                     # route to instance with fewest active connections

        # Docker Compose DNS resolves "app" to all running replicas.
        # keepalive: reuse connections to app instances (avoids TCP handshake per request).
        server app:9999;
        keepalive 32;                   # max idle keepalive connections to all upstreams
    }

    # ── Global settings ─────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    types_hash_max_size 2048;

    # Don't leak Nginx version in error pages and headers
    server_tokens off;

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log combined buffer=16k flush=5s;
    error_log  /var/log/nginx/error.log warn;

    # ── Rate limiting ────────────────────────────────────────────────────────
    # 100 req/sec per IP with a burst of 200. Protects against single-source floods.
    limit_req_zone $binary_remote_addr zone=api:10m rate=100r/s;

    # ── Server block ─────────────────────────────────────────────────────────
    server {
        listen 80;

        # Nginx self health check — used by external monitors, not by upstream probes
        location /nginx-health {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        # App actuator health — pass through for ALB / external health check
        location /actuator/health {
            proxy_pass       http://shoppingcart;
            proxy_http_version 1.1;
            proxy_set_header Connection "";   # required for keepalive to upstream
            access_log off;
        }

        # ── All other API traffic ─────────────────────────────────────────
        location / {
            limit_req zone=api burst=200 nodelay;

            proxy_pass          http://shoppingcart;
            proxy_http_version  1.1;
            proxy_set_header    Connection       "";   # keepalive to upstream
            proxy_set_header    Host             $host;
            proxy_set_header    X-Real-IP        $remote_addr;
            proxy_set_header    X-Forwarded-For  $proxy_add_x_forwarded_for;
            proxy_set_header    X-Forwarded-Proto $scheme;

            proxy_connect_timeout  3s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Return 502 immediately if all upstreams are unhealthy (instead of queuing)
            proxy_next_upstream error timeout http_502 http_503;
            proxy_next_upstream_tries 2;
        }
    }
}
