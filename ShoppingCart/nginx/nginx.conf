events {
    worker_connections 1024;
}

http {
    upstream shoppingcart {
        least_conn;                   # route to instance with fewest active connections
        server app:9999;              # Docker Compose resolves "app" to all scaled replicas
    }

    server {
        listen 80;

        # Health check for the load balancer itself
        location /nginx-health {
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            proxy_pass         http://shoppingcart;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_connect_timeout 3s;
            proxy_read_timeout    60s;
        }
    }
}
