# Development Profile
# Activate with: spring.profiles.active=dev

# MySQL - Development
spring.datasource.url=jdbc:mysql://localhost:3306/data_platform
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect

# SQL logging for development
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=trace

# Flink - Development
flink.base_url=http://localhost:8081
flink.sql_gateway.base_url=http://localhost:8083

# Zeppelin - Development
zeppelin.base_url=http://localhost:9080

# CORS - Permissive for development
cors.allowed-origins=*

# Scheduled tasks
job.status.update.cron=*/10 * * * * *

# Actuator - Full access for development
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
