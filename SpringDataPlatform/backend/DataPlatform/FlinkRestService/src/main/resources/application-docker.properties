# Docker Profile — activated via SPRING_PROFILES_ACTIVE=docker
# Uses Docker Compose service names as hostnames.

# MySQL (service name: mysql)
spring.datasource.url=jdbc:mysql://mysql:3306/data_platform?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# Flink — override via FLINK_BASE_URL env var when Flink is available
flink.base_url=${FLINK_BASE_URL:http://flink-jobmanager:8081}
flink.sql_gateway.base_url=${FLINK_SQL_GATEWAY_URL:http://flink-jobmanager:8083}

# Zeppelin — override via ZEPPELIN_BASE_URL env var when Zeppelin is available
zeppelin.base_url=${ZEPPELIN_BASE_URL:http://zeppelin:8080}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:*}

# Scheduled job-status polling (slower than dev to reduce noise when Flink is absent)
job.status.update.cron=*/30 * * * * *

# Logging
logging.level.com.yen.FlinkRestService=INFO
