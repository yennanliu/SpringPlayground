# Production Profile
# Activate with: spring.profiles.active=prod

# MySQL - Production (use environment variables)
spring.datasource.url=${DATABASE_URL:jdbc:mysql://localhost:3306/data_platform}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect

# Connection pool settings
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# Flink - Production (use environment variables)
flink.base_url=${FLINK_BASE_URL:http://localhost:8081}
flink.sql_gateway.base_url=${FLINK_SQL_GATEWAY_URL:http://localhost:8083}

# Zeppelin - Production (use environment variables)
zeppelin.base_url=${ZEPPELIN_BASE_URL:http://localhost:9080}

# CORS - Restrictive for production
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Scheduled tasks
job.status.update.cron=*/30 * * * * *

# Actuator - Limited access for production
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# Logging
logging.level.root=WARN
logging.level.com.yen.FlinkRestService=INFO
