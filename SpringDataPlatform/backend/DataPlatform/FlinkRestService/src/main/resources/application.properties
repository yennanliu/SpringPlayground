# Spring Application
spring.application.name=flink-rest-service
server.port=${SERVER_PORT:9999}

# Default profile (override with spring.profiles.active)
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# File upload limits
server.tomcat.max-http-form-post-size=20MB
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Upload directory for JAR files (default: upload-dir). Override to redirect to a larger volume.
# storage.location=upload-dir

# JPA common settings
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.globally_quoted_identifiers=true

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized
management.health.db.enabled=true

# OpenAPI / Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
