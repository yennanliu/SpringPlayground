version: '3.8'

# ──────────────────────────────────────────────────────────────────────────────
# DataPlatform dev stack — Apple Silicon (M1/M2/M3) variant
# Adds platform: linux/arm64 where needed.
#
# Usage: docker compose -f docker-compose-m1.yml up --build
# ──────────────────────────────────────────────────────────────────────────────

services:

  mysql:
    image: mysql:8.0
    platform: linux/arm64
    restart: always
    environment:
      MYSQL_DATABASE: data_platform
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  app:
    build: ./backend/DataPlatform/FlinkRestService
    platform: linux/arm64
    restart: on-failure
    ports:
      - "9999:9999"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      FLINK_BASE_URL: ${FLINK_BASE_URL:-http://localhost:8081}
      FLINK_SQL_GATEWAY_URL: ${FLINK_SQL_GATEWAY_URL:-http://localhost:8083}
      ZEPPELIN_BASE_URL: ${ZEPPELIN_BASE_URL:-http://localhost:9080}
    volumes:
      - upload-dir:/app/upload-dir
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  vue:
    build: ./frontend/data-platform-ui
    platform: linux/arm64
    restart: on-failure
    ports:
      - "8080:8080"
    volumes:
      - ./frontend/data-platform-ui:/app
      - /app/node_modules
    environment:
      VUE_APP_API_BASE_URL: http://localhost:8081

  nginx:
    build: ./nginx
    platform: linux/arm64
    restart: on-failure
    ports:
      - "8081:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  mysql-data:
  upload-dir:
