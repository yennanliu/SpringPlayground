version: '3.8'

# ──────────────────────────────────────────────────────────────────────────────
# DataPlatform dev stack
#
# Services:
#   mysql   — MySQL 8.0 database
#   app     — Spring Boot REST service (built from multi-stage Dockerfile)
#   vue     — Vue.js frontend dev server
#   nginx   — Reverse proxy: port 8081 → app:9999
#
# Quick start:
#   docker compose up --build
#
# Access:
#   UI (via nginx) : http://localhost:8082          ← main entry point
#   API (via nginx): http://localhost:8082/cluster  ← same origin as UI
#   Vue dev server : http://localhost:8079          ← direct (dev only)
#   API direct     : http://localhost:9997          ← direct (dev only)
#   Swagger        : http://localhost:8082/swagger-ui.html
#
# Flink / Zeppelin are external services. The app starts without them and logs
# warnings when the scheduled job-status poll cannot reach Flink.
# Override their URLs via env vars:
#   FLINK_BASE_URL=http://<host>:8081
#   FLINK_SQL_GATEWAY_URL=http://<host>:8083
#   ZEPPELIN_BASE_URL=http://<host>:9080
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL 8.0 ────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: data_platform
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Spring Boot app ───────────────────────────────────────────────────────────
  app:
    build: ./backend/DataPlatform/FlinkRestService
    restart: on-failure
    ports:
      - "9997:9999"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Flink / Zeppelin — override when those services are available
      FLINK_BASE_URL: ${FLINK_BASE_URL:-http://localhost:8081}
      FLINK_SQL_GATEWAY_URL: ${FLINK_SQL_GATEWAY_URL:-http://localhost:8083}
      ZEPPELIN_BASE_URL: ${ZEPPELIN_BASE_URL:-http://localhost:9080}
    volumes:
      # Named volume for uploaded JARs — persists across container restarts
      - upload-dir:/app/upload-dir
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ── Vue.js frontend (dev server) ─────────────────────────────────────────────
  vue:
    build: ./frontend/data-platform-ui
    restart: on-failure
    ports:
      - "8079:8080"
    volumes:
      - ./frontend/data-platform-ui:/app
      # Preserve the node_modules installed during docker build — prevents the
      # bind mount from shadowing them and causing "vue-cli-service not found".
      - /app/node_modules
    environment:
      # Tell the Vue app to call the API via the nginx proxy on the host
      VUE_APP_API_BASE_URL: http://localhost:8082

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  # Routes:
  #   /cluster /jar /job /sql_job /zeppelin /notebook /actuator /v3 /swagger-ui
  #                                   → Spring Boot app:9999
  #   / (everything else + WS/HMR)   → Vue dev server vue:8080
  nginx:
    build: ./nginx
    restart: on-failure
    ports:
      - "8082:80"
    depends_on:
      app:
        condition: service_healthy
      vue:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  mysql-data:
  upload-dir:
