version: '3.8'

# ──────────────────────────────────────────────────────────────────────────────
# DataPlatform dev stack
#
# Core services (always started):
#   mysql   — MySQL 8.0
#   app     — Spring Boot REST service
#   vue     — Vue.js frontend dev server
#   nginx   — Reverse proxy (UI + API on one port)
#
# Optional Flink cluster (add --profile flink to enable):
#   flink-jobmanager  — Flink REST API + Job coordination  :8081
#   flink-taskmanager — Flink task execution
#   flink-sql-gateway — Flink SQL Gateway REST API          :8083
#
# Quick start (no Flink):
#   docker compose up --build
#
# Quick start (with Flink):
#   docker compose --profile flink up --build
#
# Access:
#   UI (via nginx)   : http://localhost:8082          ← main entry point
#   Swagger          : http://localhost:8082/swagger-ui.html
#   Vue dev (direct) : http://localhost:8079
#   API direct       : http://localhost:9997
#   Flink UI         : http://localhost:8081           (--profile flink only)
#   SQL Gateway      : http://localhost:8083           (--profile flink only)
# ──────────────────────────────────────────────────────────────────────────────

services:

  # ── MySQL 8.0 ─────────────────────────────────────────────────────────────────
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: data_platform
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Spring Boot app ────────────────────────────────────────────────────────────
  app:
    build: ./backend/DataPlatform/FlinkRestService
    restart: on-failure
    ports:
      - "9997:9999"
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      # Flink — uses Docker service names so they work inside the container.
      # Without --profile flink these will get connection-refused (handled gracefully).
      FLINK_BASE_URL: ${FLINK_BASE_URL:-http://flink-jobmanager:8081}
      FLINK_SQL_GATEWAY_URL: ${FLINK_SQL_GATEWAY_URL:-http://flink-sql-gateway:8083}
      ZEPPELIN_BASE_URL: ${ZEPPELIN_BASE_URL:-http://zeppelin:8080}
    volumes:
      - upload-dir:/app/upload-dir
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9999/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ── Vue.js frontend ────────────────────────────────────────────────────────────
  vue:
    build: ./frontend/data-platform-ui
    restart: on-failure
    ports:
      - "8079:8080"
    volumes:
      - ./frontend/data-platform-ui:/app
      - /app/node_modules
    environment:
      VUE_APP_API_BASE_URL: http://localhost:8082

  # ── Nginx reverse proxy ────────────────────────────────────────────────────────
  nginx:
    build: ./nginx
    restart: on-failure
    ports:
      - "8082:80"
    depends_on:
      app:
        condition: service_healthy
      vue:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Flink JobManager (optional — enable with --profile flink) ─────────────────
  flink-jobmanager:
    image: flink:1.17-scala_2.12-java11
    profiles: ["flink"]
    hostname: flink-jobmanager
    command: jobmanager
    ports:
      - "8081:8081"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        rest.address: 0.0.0.0
        rest.port: 8081
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8081/overview"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Flink TaskManager (optional — enable with --profile flink) ────────────────
  flink-taskmanager:
    image: flink:1.17-scala_2.12-java11
    profiles: ["flink"]
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: taskmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        taskmanager.numberOfTaskSlots: 2

  # ── Flink SQL Gateway (optional — enable with --profile flink) ────────────────
  # Starts the SQL Gateway REST endpoint on port 8083.
  # The app service calls it via http://flink-sql-gateway:8083.
  # FLINK_PROPERTIES is written to flink-conf.yaml by the image entrypoint —
  # this is the correct way to pass config in the official Flink Docker image.
  flink-sql-gateway:
    image: flink:1.17-scala_2.12-java11
    profiles: ["flink"]
    depends_on:
      flink-jobmanager:
        condition: service_healthy
    command: bash -c "sleep 5 && /opt/flink/bin/sql-gateway.sh start-foreground"
    ports:
      - "8083:8083"
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.rpc.address: flink-jobmanager
        sql-gateway.endpoint.rest.address: 0.0.0.0
        sql-gateway.endpoint.rest.port: 8083
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8083/v1/info"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

volumes:
  mysql-data:
  upload-dir:
