<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <link rel="icon" href="<%= BASE_URL %>favicon.ico">
  <title>Data Platform</title>
  <meta name="referrer" content="no-referrer">

  <!-- Inter — clean modern system font for data-dense UIs -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <!-- Bootstrap 4 CSS (layout grid used by some views) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <style>
    /* CSS custom properties — single source of truth for the design system */
    :root {
      --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Courier New', monospace;

      --color-black:   #0a0a0a;
      --color-white:   #ffffff;
      --color-accent:  #f0c14b;
      --color-accent-dark: #d4a83a;
      --color-accent-light: rgba(240, 193, 75, 0.12);

      --color-gray-50:  #fafafa;
      --color-gray-100: #f4f4f5;
      --color-gray-200: #e4e4e7;
      --color-gray-300: #d4d4d8;
      --color-gray-400: #a1a1aa;
      --color-gray-500: #71717a;
      --color-gray-600: #52525b;
      --color-gray-700: #3f3f46;
      --color-gray-800: #27272a;
      --color-gray-900: #18181b;

      --color-success: #22c55e;
      --color-danger:  #ef4444;
      --color-warning: #f59e0b;
      --color-info:    #3b82f6;

      --color-success-bg: rgba(34, 197, 94, 0.1);
      --color-danger-bg:  rgba(239, 68, 68, 0.1);
      --color-warning-bg: rgba(245, 158, 11, 0.1);
      --color-info-bg:    rgba(59, 130, 246, 0.1);

      --radius-sm:  6px;
      --radius-md:  10px;
      --radius-lg:  14px;
      --radius-xl:  20px;
      --radius-full: 9999px;

      --shadow-sm:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md:  0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
      --shadow-lg:  0 10px 28px rgba(0,0,0,.10), 0 4px 8px rgba(0,0,0,.04);
      --shadow-xl:  0 20px 48px rgba(0,0,0,.14), 0 8px 16px rgba(0,0,0,.06);
      --shadow-accent: 0 8px 24px rgba(240,193,75,.30);

      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: var(--font-sans);
      background: var(--color-gray-50);
      color: var(--color-gray-900);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Smooth scrolling */
    html { scroll-behavior: smooth; }

    /* Selection color */
    ::selection {
      background: var(--color-accent);
      color: var(--color-black);
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--color-gray-100); }
    ::-webkit-scrollbar-thumb { background: var(--color-gray-300); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--color-gray-400); }
  </style>
</head>
<body>
<noscript>
  <strong>This app requires JavaScript. Please enable it to continue.</strong>
</noscript>
<div id="app"></div>
</body>
</html>
