worker_processes auto;

events {
    worker_connections 1024;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # Spring Boot REST API
    upstream backend {
        server app:9999;
        keepalive 16;
    }

    # Vue.js dev server (HMR WebSocket included)
    upstream frontend {
        server vue:8080;
        keepalive 8;
    }

    server {
        listen 80;
        server_name localhost;

        # ── Docker HEALTHCHECK endpoint ────────────────────────────────────
        location = /health {
            return 200 'ok\n';
            add_header Content-Type text/plain;
        }

        # ── Spring Boot API paths ──────────────────────────────────────────
        # Match exact API prefixes only — (/|$) ensures /job matches but /jobs does NOT.
        # Without (/|$), /job would prefix-match /jobs/ and send Vue frontend routes
        # to Spring Boot, causing "Whitelabel Error Page" on browser refresh.
        location ~ ^/(users|cluster|jar|job|sql_job|zeppelin|notebook|actuator|v3|swagger-ui|webjars)(/|$) {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Connection        "";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 20s;
            proxy_read_timeout    60s;
        }

        # ── Vue.js frontend (catch-all) ────────────────────────────────────
        # Includes WebSocket upgrade for Vue CLI hot-module-replacement (HMR).
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            # WebSocket passthrough for HMR
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 86400s;
        }
    }
}
