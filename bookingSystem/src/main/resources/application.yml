spring:
  application:
    name: bookingSystem

  # Virtual Threads (JDK 21) — Tomcat uses a virtual thread per request
  # instead of blocking OS threads, enabling C10K-scale concurrency
  threads:
    virtual:
      enabled: true

  # H2 for development
  datasource:
    url: jdbc:h2:mem:booking;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis (used by RedisOverbookingGuard when booking.redis.enabled=true)
  data:
    redis:
      host: localhost
      port: 6379

# Overbooking prevention via Redis atomic DECR
# Set to true to enable; false (default) falls back to DB-only conflict detection
booking:
  redis:
    enabled: false

# Swagger
springdoc:
  swagger-ui:
    path: /swagger-ui.html

---
# Production profile
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: jdbc:postgresql://localhost:5432/booking
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    hikari:
      maximum-pool-size: 20
  h2:
    console:
      enabled: false
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
