<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #e4e4e4;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        header h1 {
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d9ff, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        header p {
            color: #888;
            font-size: 1.1rem;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            justify-content: center;
        }

        .tab-btn {
            padding: 12px 30px;
            border: none;
            background: rgba(255,255,255,0.05);
            color: #888;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .tab-btn:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            color: #fff;
            border-color: transparent;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: rgba(0,217,255,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #fff;
        }

        .badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .badge-confirmed {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
        }

        .badge-cancelled {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .badge-room {
            background: rgba(14, 165, 233, 0.2);
            color: #0ea5e9;
        }

        .badge-desk {
            background: rgba(245, 158, 11, 0.2);
            color: #f59e0b;
        }

        .card-body {
            color: #999;
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .card-body p {
            margin-bottom: 8px;
        }

        .card-body strong {
            color: #ccc;
        }

        .card-actions {
            margin-top: 16px;
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: #ef4444;
            color: #fff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #0ea5e9, #06b6d4);
            color: #fff;
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* Form Styles */
        .form-card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            padding: 30px;
            border: 1px solid rgba(255,255,255,0.08);
            max-width: 500px;
            margin: 0 auto 40px;
        }

        .form-card h3 {
            margin-bottom: 24px;
            color: #fff;
            font-size: 1.3rem;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.9rem;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            font-size: 1rem;
            transition: border-color 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #0ea5e9;
        }

        .form-group input::placeholder {
            color: #555;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 16px 24px;
            border-radius: 10px;
            color: #fff;
            font-weight: 500;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast-success {
            background: linear-gradient(135deg, #10b981, #059669);
        }

        .toast-error {
            background: linear-gradient(135deg, #ef4444, #dc2626);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.3;
        }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #0ea5e9;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .grid {
                grid-template-columns: 1fr;
            }
            .form-row {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Booking System</h1>
            <p>Manage your resources and bookings</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="showTab('bookings')">Bookings</button>
            <button class="tab-btn" onclick="showTab('resources')">Resources</button>
        </div>

        <!-- Bookings Tab -->
        <div id="bookings-tab" class="tab-content active">
            <div class="form-card">
                <h3>New Booking</h3>
                <form id="booking-form" onsubmit="createBooking(event)">
                    <div class="form-group">
                        <label>Resource</label>
                        <select id="booking-resource" required>
                            <option value="">Select a resource...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>User ID</label>
                        <input type="text" id="booking-user" placeholder="e.g., user123" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Start Time</label>
                            <input type="datetime-local" id="booking-start" required>
                        </div>
                        <div class="form-group">
                            <label>End Time</label>
                            <input type="datetime-local" id="booking-end" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%; padding:14px;">
                        Create Booking
                    </button>
                </form>
            </div>

            <div id="bookings-list" class="grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading bookings...</p>
                </div>
            </div>
        </div>

        <!-- Resources Tab -->
        <div id="resources-tab" class="tab-content">
            <div class="form-card">
                <h3>Add Resource</h3>
                <form id="resource-form" onsubmit="createResource(event)">
                    <div class="form-group">
                        <label>Name</label>
                        <input type="text" id="resource-name" placeholder="e.g., Conference Room A" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Type</label>
                            <select id="resource-type">
                                <option value="room">Room</option>
                                <option value="desk">Desk</option>
                                <option value="equipment">Equipment</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Capacity</label>
                            <input type="number" id="resource-capacity" value="1" min="1">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width:100%; padding:14px;">
                        Add Resource
                    </button>
                </form>
            </div>

            <div id="resources-list" class="grid">
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Loading resources...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API = '';

        // Tab switching
        function showTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));

            document.querySelector(`[onclick="showTab('${tab}')"]`).classList.add('active');
            document.getElementById(`${tab}-tab`).classList.add('active');

            if (tab === 'bookings') loadBookings();
            if (tab === 'resources') loadResources();
        }

        // Toast notification
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        // Format datetime for display
        function formatDateTime(dt) {
            if (!dt) return '-';
            const d = new Date(dt);
            return d.toLocaleDateString() + ' ' + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        }

        // Load resources
        async function loadResources() {
            try {
                const res = await fetch(`${API}/api/resources`);
                const resources = await res.json();

                const container = document.getElementById('resources-list');

                if (resources.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>
                            </svg>
                            <p>No resources yet. Add one above!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = resources.map(r => `
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">${r.name}</span>
                            <span class="badge badge-${r.type || 'room'}">${r.type || 'general'}</span>
                        </div>
                        <div class="card-body">
                            <p><strong>ID:</strong> ${r.id.slice(0,8)}...</p>
                            <p><strong>Capacity:</strong> ${r.capacity} ${r.capacity > 1 ? 'people' : 'person'}</p>
                            <p><strong>Status:</strong> ${r.active ? '🟢 Active' : '🔴 Inactive'}</p>
                        </div>
                        <div class="card-actions">
                            <button class="btn btn-danger" onclick="deleteResource('${r.id}')">Delete</button>
                        </div>
                    </div>
                `).join('');

                // Update booking form dropdown
                updateResourceDropdown(resources);
            } catch (err) {
                showToast('Failed to load resources', 'error');
            }
        }

        // Update resource dropdown in booking form
        function updateResourceDropdown(resources) {
            const select = document.getElementById('booking-resource');
            select.innerHTML = '<option value="">Select a resource...</option>' +
                resources.filter(r => r.active).map(r =>
                    `<option value="${r.id}">${r.name} (${r.type})</option>`
                ).join('');
        }

        // Create resource
        async function createResource(e) {
            e.preventDefault();

            const data = {
                name: document.getElementById('resource-name').value,
                type: document.getElementById('resource-type').value,
                capacity: parseInt(document.getElementById('resource-capacity').value)
            };

            try {
                const res = await fetch(`${API}/api/resources`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (!res.ok) throw new Error('Failed to create');

                showToast('Resource created successfully!');
                document.getElementById('resource-form').reset();
                loadResources();
            } catch (err) {
                showToast('Failed to create resource', 'error');
            }
        }

        // Delete resource
        async function deleteResource(id) {
            if (!confirm('Delete this resource?')) return;

            try {
                await fetch(`${API}/api/resources/${id}`, { method: 'DELETE' });
                showToast('Resource deleted');
                loadResources();
            } catch (err) {
                showToast('Failed to delete', 'error');
            }
        }

        // Load bookings
        async function loadBookings() {
            try {
                const res = await fetch(`${API}/api/bookings?size=50`);
                const data = await res.json();
                const bookings = data.content || [];

                const container = document.getElementById('bookings-list');

                if (bookings.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state" style="grid-column: 1/-1;">
                            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                            <p>No bookings yet. Create one above!</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = bookings.map(b => `
                    <div class="card">
                        <div class="card-header">
                            <span class="card-title">Booking</span>
                            <span class="badge badge-${b.status.toLowerCase()}">${b.status}</span>
                        </div>
                        <div class="card-body">
                            <p><strong>ID:</strong> ${b.id.slice(0,8)}...</p>
                            <p><strong>Resource:</strong> ${b.resourceId.slice(0,8)}...</p>
                            <p><strong>User:</strong> ${b.userId}</p>
                            <p><strong>Start:</strong> ${formatDateTime(b.startTime)}</p>
                            <p><strong>End:</strong> ${formatDateTime(b.endTime)}</p>
                        </div>
                        <div class="card-actions">
                            ${b.status === 'CONFIRMED' ?
                                `<button class="btn btn-danger" onclick="cancelBooking('${b.id}')">Cancel</button>`
                                : ''}
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                showToast('Failed to load bookings', 'error');
            }
        }

        // Create booking
        async function createBooking(e) {
            e.preventDefault();

            const data = {
                resourceId: document.getElementById('booking-resource').value,
                userId: document.getElementById('booking-user').value,
                startTime: document.getElementById('booking-start').value + ':00',
                endTime: document.getElementById('booking-end').value + ':00'
            };

            const idempotencyKey = 'idem-' + Date.now() + '-' + Math.random().toString(36).substr(2, 9);

            try {
                const res = await fetch(`${API}/api/bookings`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Idempotency-Key': idempotencyKey
                    },
                    body: JSON.stringify(data)
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.message || 'Failed to create');
                }

                showToast('Booking created successfully!');
                document.getElementById('booking-form').reset();
                loadBookings();
            } catch (err) {
                showToast(err.message || 'Failed to create booking', 'error');
            }
        }

        // Cancel booking
        async function cancelBooking(id) {
            if (!confirm('Cancel this booking?')) return;

            try {
                await fetch(`${API}/api/bookings/${id}`, { method: 'DELETE' });
                showToast('Booking cancelled');
                loadBookings();
            } catch (err) {
                showToast('Failed to cancel', 'error');
            }
        }

        // Initial load
        loadBookings();
        loadResources();
    </script>
</body>
</html>
