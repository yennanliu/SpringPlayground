spring.application.name=clusterAdmin
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:clusterdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.yen.clusterAdmin=DEBUG

# AWS Configuration
aws.region=${AWS_REGION:us-east-1}
aws.accessKeyId=${AWS_ACCESS_KEY_ID:}
aws.secretKey=${AWS_SECRET_ACCESS_KEY:}

# EC2 Defaults (configure these for your environment)
ec2.default.ami=${EC2_DEFAULT_AMI:ami-0c02fb55956c7d316}
ec2.default.instanceType=${EC2_DEFAULT_INSTANCE_TYPE:t3.medium}
ec2.default.keyName=${EC2_DEFAULT_KEY_NAME:}
ec2.default.securityGroupId=${EC2_DEFAULT_SECURITY_GROUP:}
ec2.default.subnetId=${EC2_DEFAULT_SUBNET:}

# Cluster Settings
# Set to true to enable actual EC2 operations (requires valid AWS credentials)
cluster.ec2.enabled=${CLUSTER_EC2_ENABLED:false}

# Health Monitor Settings
cluster.health.check.enabled=${HEALTH_CHECK_ENABLED:true}
cluster.health.check.interval=${HEALTH_CHECK_INTERVAL:30000}
cluster.health.check.timeout=${HEALTH_CHECK_TIMEOUT:5000}
cluster.health.check.unhealthyThreshold=${HEALTH_CHECK_UNHEALTHY_THRESHOLD:3}
cluster.health.check.port=${HEALTH_CHECK_PORT:8080}
cluster.health.check.path=${HEALTH_CHECK_PATH:/health}
